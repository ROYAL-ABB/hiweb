<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>linnn 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at 20% 20%, rgba(255, 105, 180, 0.15), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(255, 20, 147, 0.12), transparent 40%),
              radial-gradient(circle at bottom, #2b0033, #000000);

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 30px;
  padding: 50px;
  text-align: center;
  backdrop-filter: blur(25px);
  box-shadow: 0 0 80px rgba(255,105,180,0.25);
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: linear-gradient(45deg, #ff4da6, #ff99cc);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  color: white;
  margin: 5px;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
}

#message {
  margin-top: 20px;
  color: #ffd6ec;
}

#question {
  margin-top: 25px;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
}

#answers {
  margin-top: 15px;
}

#response {
  margin-top: 15px;
  color: #ffd6ec;
  font-size: 18px;
}

/* floating hearts */
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
  <button onclick="startLove()">New Message 💖</button>

  <div id="message"></div>

  <div id="question">
    <p>AND nowww Be honest... who's more beautiful✨</p>

    <div id="answers">
      <button onclick="wrongAnswer()">Leah Halton</button>
      <button onclick="wrongAnswer()">Madison Beer</button>
      <button onclick="correctAnswer()">LINNN 💖</button>
      <button onclick="wrongAnswer()">Angelina Jolie</button>
    </div>

    <div id="response"></div>
  </div>
</div>

<script>
const messages = [
"Heyyyy the mosttt beautiful girlll 💖\n\nGood morning ☀️\nI hope your day is as amazing as your smile… \n\nand honestly, even better because you deserve it ♥️"
];

let text = "";
let index = 0;

/* start */
function startLove() {
  text = messages[0];
  index = 0;
  document.getElementById("message").innerHTML = "";
  typeWriter();
  burstHearts();
}

/* typing effect */
function typeWriter() {
  if (index < text.length) {
    document.getElementById("message").innerHTML += 
      text.charAt(index) === "\n" ? "<br>" : text.charAt(index);
    index++;
    setTimeout(typeWriter, 40);
  }
}

/* correct answer */
function correctAnswer() {
  document.getElementById("response").innerHTML =
  "YESSS CORRECT 😍💖<br>LINNN IS THE MOST BEAUTIFUL, CUTEST, SMARTEST, AND PRETTIEST GIRL EVERRR ✨💖";
  burstHearts();
}

/* wrong answer */
function wrongAnswer() {
  document.getElementById("response").innerHTML =
  "WHAT ??? 😡<br>Change your answer !!! Who can be prettier than LINNN ???? 💖";
}

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "absolute";
  heart.style.bottom = "-50px";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animation = "floatUp linear";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 300);

/* burst hearts */
function burstHearts() {
  for (let i = 0; i < 25; i++) {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "absolute";
    heart.style.left = "50%";
    heart.style.top = "50%";

    const x = (Math.random() - 0.5) * 400;
    const y = (Math.random() - 0.5) * 400;

    heart.style.transition = "1s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.style.transform = `translate(${x}px, ${y}px)`;
      heart.style.opacity = 0;
    }, 10);

    setTimeout(() => heart.remove(), 1000);
  }
}
</script>

</body>
</html>
