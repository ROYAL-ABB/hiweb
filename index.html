<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>linnn 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at 20% 20%, rgba(255, 105, 180, 0.15), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(255, 20, 147, 0.12), transparent 40%),
              radial-gradient(circle at bottom, #2b0033, #000000);

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 30px;
  padding: 50px;
  text-align: center;
  backdrop-filter: blur(25px);
  box-shadow: 0 0 80px rgba(255,105,180,0.25);
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: linear-gradient(45deg, #ff4da6, #ff99cc);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  color: white;
  margin: 5px;
  transition: 0.2s;
}

#message {
  margin-top: 20px;
  color: #ffd6ec;
}

.music-btn {
  margin-top: 10px;
  background: transparent;
  border: 2px solid #ff66b2;
}

#question {
  margin-top: 20px;
  color: #fff;
  font-size: 18px;
}

#answers {
  margin-top: 10px;
}

#response {
  margin-top: 15px;
  color: #ffd6ec;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="card">
  <button onclick="startLove()">Click Me 💖</button>
  <br>
  <button class="music-btn" onclick="openMusic()">click me and relax 💖</button>

  <div id="message"></div>

  <div id="question">
    <p>Did I match your sweetness level?</p>

    <div id="answers">
      <button id="yesBtn" onclick="moveYes()">Yes</button>
      <button onclick="noClicked()">No</button>
    </div>

    <div id="response"></div>
  </div>
</div>

<script>
const messages = [
"Heyyyy the mosttt beautiful girlll\n\ngood morning , andd hope you have a great day ♥️"
];

let text = "";
let index = 0;

function startLove() {
  text = messages[0];
  index = 0;
  document.getElementById("message").innerHTML = "";
  typeWriter();
  burstHearts();
}

function typeWriter() {
  if (index < text.length) {
    document.getElementById("message").innerHTML += 
      text.charAt(index) === "\n" ? "<br>" : text.charAt(index);
    index++;
    setTimeout(typeWriter, 40);
  }
}

function openMusic() {
  window.open("https://youtu.be/ztmhivIdpQw?si=Cg_5UqEprFjVSozY", "_blank");
}

/* YES moves when clicked */
function moveYes() {
  const btn = document.getElementById("yesBtn");

  const x = (Math.random() - 0.5) * 300;
  const y = (Math.random() - 0.5) * 300;

  btn.style.transform = `translate(${x}px, ${y}px)`;
}

/* NO shows message under buttons */
function noClicked() {
  document.getElementById("response").innerHTML =
  "yes i didn't because you are the only one who got this level of sweetness 💖";
}

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "absolute";
  heart.style.bottom = "-50px";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animation = "floatUp linear";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 300);

function burstHearts() {
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "absolute";
    heart.style.left = "50%";
    heart.style.top = "50%";

    const x = (Math.random() - 0.5) * 300;
    const y = (Math.random() - 0.5) * 300;

    heart.style.transition = "1s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.style.transform = `translate(${x}px, ${y}px)`;
      heart.style.opacity = 0;
    }, 10);

    setTimeout(() => heart.remove(), 1000);
  }
}
</script>

</body>
</html>
